name: 'CodeQL'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ['main', 'master']
    paths-ignore:
      - '.github/**'
      - 'docs/**'
  schedule:
    - cron: '40 4 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  scan:
    name: 'Audit Repository'
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-python-codeql.yaml@f43b219b8a91dcd082f26419008c8bf5544ec212  # v0.6.0
    with:
      codeql_config: .github/codeql/codeql-config.yml
    permissions:
      security-events: write  # Upload CodeQL results to code scanning.
      # required to fetch internal or private CodeQL packs
      packages: read  # Fetch internal or private CodeQL packs.
      # only required for workflows in private repositories
      actions: read  # Read workflow metadata (private repos only).
      contents: read  # Check out the repository to analyze.

---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Runs on a new pull request, performs build and runs tests
name: 'Python Build/Test/Release'

# yamllint disable-line rule:truthy
on:
  # Trigger on tag push events
  push:
    tags:
      - '**'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  repository-metadata:
    name: "Repository Metadata"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 5
    steps:
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: "Gather repository metadata"
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@ceabcd987d13d7bfefd2372e01eebb0ddac45956  # v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: 'false'
          artifact_upload: 'true'
          artifact_formats: 'json'

  tag-validate:
    name: 'Validate Tag Push'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write  # Needed to draft a release
    timeout-minutes: 5
    outputs:
      tag: "${{ steps.tag-validate.outputs.tag_name }}"
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 'Verify pushed tag'
        id: 'tag-validate'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/tag-validate-action@461d187a53b5de27b068c2cea5af972c085a4a6a  # v1.0.2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          require_type: 'semver'
          reject_development: 'true'
          require_github: 'true'
          # yamllint disable-line rule:line-length
          require_signed: 'ssh,gpg-unverifiable'  # Cannot verify GPG without key

      - name: 'Ensure draft release exists'
        id: 'ensure-release'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          # Ensure draft release exists
          TAG="${{ steps.tag-validate.outputs.tag_name }}"
          # Check if release exists and get its draft status
          if RELEASE_INFO=$(gh release view "$TAG" \
            --json isDraft 2>/dev/null); then
            IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Draft release for tag $TAG already exists"
            else
              echo "Published release for tag $TAG already exists"
            fi
          else
            echo "Creating draft release for tag $TAG"
            gh release create "$TAG" \
              --draft \
              --title "Release $TAG" \
              --notes "Automated release for $TAG"
          fi

  python-build:
    name: 'Python Build'
    needs: 'tag-validate'
    runs-on: 'ubuntu-latest'
    outputs:
      matrix_json: "${{ steps.python-build.outputs.matrix_json }}"
      artefact_name: "${{ steps.python-build.outputs.artefact_name }}"
      artefact_path: "${{ steps.python-build.outputs.artefact_path }}"
    permissions:
      contents: read
      id-token: write       # Needed for attestations
      attestations: write   # Needed for attestations
    timeout-minutes: 12
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Build Python project'
        id: 'python-build'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@38b9a4e7ee34e56d178f5bd248df52e41f7d496e  # v1.0.6
        with:
          sigstore_sign: true
          attestations: true

  python-tests:
    name: 'Python Tests'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    # Matrix job
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Test Python project [PYTEST]'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@aa753462f090101dcb0c4708e9499f55e276e373  # v1.1.2
        with:
          python_version: "${{ matrix.python-version }}"

  python-audit:
    name: 'Python Audit'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    # Matrix job
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Audit Python project'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-audit-action@275c85f883b03f5342c1fafd8173b6d996670a1d  # v0.2.7
        with:
          python_version: "${{ matrix.python-version }}"
          permit_fail: "${{ vars.NO_BLOCK_AUDIT_FAIL == 'true' }}"

  sbom:
    name: 'Generate SBOM'
    runs-on: ubuntu-latest
    needs: 'python-build'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Generate SBOM"
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-sbom-action@ae4aca2ef28d7da4ec95049cc78be43e632d322a  # v0.1.0
        with:
          include_dev: "false"
          sbom_format: "both"

      - name: "Upload SBOM artifacts"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-files
          path: |
            sbom-cyclonedx.json
            sbom-cyclonedx.xml
          retention-days: 45

      - name: "SBOM summary"
        run: |
            # SBOM summary
            {
              echo "## SBOM Summary"
              echo "SBOM count: ${{ steps.sbom.outputs.component_count }}"
              echo "Tool used: ${{ steps.sbom.outputs.dependency_manager }}"
            } >> "$GITHUB_STEP_SUMMARY"

  grype:
    name: 'Grype Audit SBOM'
    runs-on: ubuntu-latest
    needs: 'sbom'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      - name: "Download SBOM artefact"
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-files

      - name: "Install Grype"
        id: grype
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          cache-db: "true"

      # The NO_BLOCK_AUDIT_FAIL repository variable (when set to
      # 'true') disables failure propagation so releases can proceed
      # when blocked by newly discovered CVEs in transitive
      # dependencies. Without the override, this step turns red in
      # the workflow run's Actions/Checks UI and is the sole source
      # of the job's failure annotation; the CVE table is printed
      # directly into the step log by echoing grype-results.txt.
      - name: "Grype audit SBOM"
        id: grype-audit
        env:
          GRYPE_CMD: "${{ steps.grype.outputs.cmd }}"
          NO_BLOCK_AUDIT_FAIL: >-
            ${{ vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        run: |
            # Run grype once, emitting all three output formats
            # Render the human-readable table in this step's log
            set +e
            "${GRYPE_CMD}" \
              -o "sarif=grype-results.sarif" \
              -o "json=grype-results.json" \
              -o "table=grype-results.txt" \
              --fail-on medium \
              "sbom:sbom-cyclonedx.json"
            grype_exit=$?
            set -e

            echo "--- Grype scan results ---"
            if [ -f grype-results.txt ]; then
              cat grype-results.txt
            else
              echo "No table output produced"
            fi

            # grype returns 2 when it finds vulnerabilities at or
            # above the configured --fail-on threshold; any other
            # non-zero exit is treated as a grype failure.
            if [ "${grype_exit}" = "0" ]; then
              echo "No vulnerabilities at or above 'medium'"
              exit 0
            fi
            if [ "${grype_exit}" != "2" ]; then
              echo "::error::Grype exited with code ${grype_exit}"
              exit "${grype_exit}"
            fi

            if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
              echo "::warning::Grype found vulnerabilities at or" \
                "above the 'medium' threshold, but" \
                "NO_BLOCK_AUDIT_FAIL is set so the job will not" \
                "fail."
              exit 0
            fi
            echo "::error::Grype found vulnerabilities at or above" \
              "the 'medium' severity threshold. See the table" \
              "above for the offending packages and CVEs."
            exit 1

      - name: "Upload Grype scan results"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: grype-scan-results
          path: |
            grype-results.sarif
            grype-results.json
            grype-results.txt
          retention-days: 90
          if-no-files-found: warn

      - name: "Grype summary"
        if: always()
        run: |
            # Render a Markdown table of Grype matches in the job
            # step summary. The CVE data is sourced from the JSON
            # scan output (grype-results.json) and processed with
            # jq so that multi-word cells cannot accidentally break
            # the Markdown table column layout. Any literal pipe
            # characters present in cell content are escaped.
            {
              echo "## Grype Vulnerability Scan"
              echo ""
              if [ ! -f grype-results.json ]; then
                echo "No scan results available"
                exit 0
              fi
              match_count=$(jq '.matches | length' grype-results.json)
              if [ "${match_count}" = "0" ]; then
                echo "No vulnerabilities found at or above the" \
                  "configured severity threshold."
                exit 0
              fi
              echo "Found ${match_count} matching Grype record(s)."
              echo ""
              echo "| Package | Installed | Fixed In | Type |" \
                "Vulnerability | Severity | EPSS | Risk |"
              echo "| --- | --- | --- | --- | --- | --- | --- | --- |"
              jq -r '
                def esc: tostring | gsub("\\|"; "\\|");
                # Round a numeric value to two decimal places
                # using half-up rounding via jq built-in `round`.
                def round2: (. * 100 | round) / 100;
                def epss_pct:
                  ( .vulnerability.epss // [] ) as $e
                  | if ($e | length) == 0 then "-"
                    else ( $e[0].epss // 0 ) as $p
                      | if $p == 0 then "0%"
                        elif ($p * 100) < 0.01 then "<0.01%"
                        else ( ($p * 100) | round2 | tostring
                               + "%" ) end
                    end;
                def risk_fmt:
                  .vulnerability.risk
                  | if . == null then "-"
                    elif type == "number" then
                      (round2 | tostring)
                    else (. | tostring) end;
                .matches[] |
                [ (.artifact.name // "-" | esc),
                  (.artifact.version // "-" | esc),
                  ( ( .vulnerability.fix.versions // [] )
                    | if length == 0 then "-"
                      else join(", ") end | esc ),
                  (.artifact.type // "-" | esc),
                  (.vulnerability.id // "-" | esc),
                  (.vulnerability.severity // "-" | esc),
                  epss_pct,
                  risk_fmt
                ] | "| " + join(" | ") + " |"
              ' grype-results.json
            } >> "$GITHUB_STEP_SUMMARY"

  # NOTE: PyPI (test and production) will reject duplicate uploads for the
  # same package version. This means the publishing steps below are NOT
  # idempotent and will fail on workflow re-runs once a version has been
  # published. This is expected behaviour and by design; it prevents the
  # release workflow as a whole from being re-runnable after success.
  test-pypi:
    name: 'Test PyPI Publishing'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'python-tests'
      - 'python-audit'
      - 'grype'
    environment:
      name: 'development'
    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    timeout-minutes: 5
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      - name: 'Test PyPI publishing'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/pypi-publish-action@f07400a2b57119f1ceac420f559803264b491f23  # v0.1.6
        with:
          environment: 'development'
          tag: "${{ needs.tag-validate.outputs.tag }}"
          pypi_credential: "${{ secrets.TEST_PYPI_CREDENTIAL }}"

  pypi:
    name: 'Release PyPI Package'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'test-pypi'
    environment:
      name: 'production'
    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    timeout-minutes: 5
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      - name: 'PyPI release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/pypi-publish-action@f07400a2b57119f1ceac420f559803264b491f23  # v0.1.6
        with:
          environment: 'production'
          attestations: true
          tag: "${{ needs.tag-validate.outputs.tag }}"
          pypi_credential: "${{ secrets.PYPI_CREDENTIAL }}"

  # Attach build artefacts prior to release promotion
  # This enables the GitHub immutable releases feature
  #
  # NOTE: This job does NOT need an isDraft guard for full workflow
  # re-runs. If the workflow is re-run after a release has already been
  # promoted (immutable), the earlier PyPI publishing steps will fail
  # first (PyPI rejects duplicate uploads), so this job will never be
  # reached. Individual job re-runs are not supported for this workflow.
  attach-artefacts:
    name: 'Attach Artefacts to Release'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'python-build'
      - 'pypi'
    # yamllint disable-line rule:line-length
    permissions:
      contents: write  # IMPORTANT: needed to edit release, attach artefacts
    timeout-minutes: 5
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: '⬇ Download build artefacts'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "${{ needs.python-build.outputs.artefact_name }}"
          path: "${{ needs.python-build.outputs.artefact_path }}"

      - name: 'Attach build artefacts to release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/release-assets-action@985ecd2ba521dde165514af406dd114d3db5dab6  # v0.1.0
        with:
          asset_paths: '["${{ needs.python-build.outputs.artefact_path }}/**"]'
          release_tag: "${{ needs.tag-validate.outputs.tag }}"


  promote-release:
    name: 'Promote Draft Release'
    # yamllint disable-line rule:line-length
    needs:
      - 'tag-validate'
      - 'attach-artefacts'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write  # IMPORTANT: needed for draft release promotion
    timeout-minutes: 2
    outputs:
      # yamllint disable-line rule:line-length
      release_url: "${{ steps.promote-release.outputs.release_url || steps.set-promoted-url.outputs.release_url }}"
    steps:
      # Harden the runner used by this workflow
      # When the CONNECTION_WHITELIST repo/org variable is exposed
      # to this run (i.e. not a fork PR), use it to enforce a
      # block-mode egress policy.
      - name: 'Harden runner (block egress with whitelist)'
        if: ${{ vars.CONNECTION_WHITELIST != '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ vars.CONNECTION_WHITELIST }}

      # Fallback for fork PRs and other contexts where the
      # CONNECTION_WHITELIST variable is not exposed to the
      # workflow.  Audit-only mode logs all egress without
      # blocking it so CI still runs.
      - name: 'Harden runner (audit fallback, no whitelist available)'
        if: ${{ vars.CONNECTION_WHITELIST == '' }}
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Check if release is already promoted'
        id: 'check-promoted'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          TAG="${{ needs.tag-validate.outputs.tag }}"
          if gh release view "$TAG" --json isDraft --jq '.isDraft' \
              2>/dev/null | grep -q "false"; then
            echo "Release $TAG is already promoted, skipping promotion"
            echo "already_promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG is draft or doesn't exist, " \
                 "proceeding with promotion"
            echo "already_promoted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Promote draft release'
        id: 'promote-release'
        if: steps.check-promoted.outputs.already_promoted == 'false'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/draft-release-promote-action@cd7cf442875ecaea5dbb070d0de94f21ece107c8  # v0.1.3
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag: "${{ needs.tag-validate.outputs.tag }}"
          latest: true

      - name: 'Set release URL for already promoted release'
        id: 'set-promoted-url'
        if: steps.check-promoted.outputs.already_promoted == 'true'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          TAG="${{ needs.tag-validate.outputs.tag }}"
          RELEASE_URL=$(gh release view "$TAG" --json url --jq '.url')
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
